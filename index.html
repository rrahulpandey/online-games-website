<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Crown | Online Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">
    <style>
        /* Gaming Theme CSS */
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            background: #1e293b;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #3b82f6;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .container {
            margin-top: 30px;
            padding: 20px;
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #board {
            width: 400px;
            max-width: 90vw; /* Mobile responsive */
        }
        .status-box {
            margin-top: 20px;
            background: #3b82f6;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        /* Earning Ad Space Placeholder */
        .ad-space {
            margin-top: 20px;
            width: 300px;
            height: 100px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav>BATTLE CROWN - FREE GAMES</nav>

<div class="container">
    <h2>♟️ Classic Chess</h2>
    <div id="board"></div>
    <div class="status-box" id="status">Turn: White</div>
</div>

<div class="ad-space">ADVERTISEMENT SPACE (EARNING)</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var $status = $('#status');

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    function onDrop (source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q' 
        });

        if (move === null) return 'snapback';
        updateStatus();
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    function updateStatus () {
        var status = '';
        var moveColor = 'White';
        if (game.turn() === 'b') moveColor = 'Black';

        if (game.in_checkmate()) {
            status = 'Game over, ' + moveColor + ' is in checkmate.';
        } else if (game.in_draw()) {
            status = 'Game over, drawn position';
        } else {
            status = moveColor + ' to move';
            if (game.in_check()) status += ', ' + moveColor + ' is in check';
        }
        $status.html(status);
    }

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    board = Chessboard('board', config);
    updateStatus();
</script>

</body>
</html>
