<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Crown | Master Chess ♟️</title>
    <style>
        /* 1. ANIMATED BACKGROUND */
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background-color: #0a0a0c; color: white; text-align: center;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 60px 60px; animation: moveBg 20s linear infinite;
        }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 60px 60px; } }

        /* 2. CHESS BOARD DESIGN */
        #chess-container {
            display: flex; flex-direction: column; align-items: center; margin-top: 30px;
        }
        .board {
            display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px);
            border: 5px solid #00f2ff; box-shadow: 0 0 20px #00f2ff;
        }
        .sq { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .white-sq { background-color: #eee; }
        .black-sq { background-color: #444; }
        .selected { background-color: #00f2ff !important; }

        /* 3. PANELS (Tera Original Idea) */
        .panel-wrap { display: flex; gap: 20px; margin-bottom: 20px; }
        .panel { padding: 10px; border: 1px solid #00f2ff; border-radius: 10px; background: rgba(0,0,0,0.5); width: 100px; }
        
        button { margin-top: 20px; padding: 10px 20px; border-radius: 20px; border: none; background: #ff4b2b; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-shadow: 0 0 10px #00f2ff;">BATTLE CROWN 🎮</h1>

    <div id="chess-container">
        <div class="panel-wrap">
            <div class="panel"><b>White</b><br><span id="w-status">Turn</span></div>
            <div class="panel"><b>Black</b><br><span id="b-status">-</span></div>
        </div>

        <div id="board" class="board"></div>
        
        <button onclick="setupBoard()">RESET GAME</button>
    </div>

    <script>
        // Chess Pieces (Unicode)
        const pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        // Initial Board Layout
        let boardState = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        let selectedSq = null;

        function setupBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `sq ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    sq.dataset.r = r; sq.dataset.c = c;
                    sq.innerHTML = pieces[boardState[r][c]] || '';
                    sq.onclick = () => handleSqClick(r, c);
                    boardDiv.appendChild(sq);
                }
            }
        }

        function handleSqClick(r, c) {
            if (selectedSq) {
                // Move Piece
                boardState[r][c] = boardState[selectedSq.r][selectedSq.c];
                boardState[selectedSq.r][selectedSq.c] = '';
                selectedSq = null;
                setupBoard();
            } else {
                if (boardState[r][c] !== '') {
                    selectedSq = {r, c};
                    setupBoard();
                    // Highlight selected
                    const idx = r * 8 + c;
                    document.getElementsByClassName('sq')[idx].classList.add('selected');
                }
            }
        }

        setupBoard();
    </script>
</body>
</html>
