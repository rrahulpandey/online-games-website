<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Crown | Chess Pro ♟️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        /* --- CSS STYLING --- */
        * { box-sizing: border-box; transition: all 0.2s linear; }
        body {
            margin: 0; background: #0a0a0c; color: white;
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 50px 50px; animation: moveBg 20s linear infinite;
        }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* SELECTION SCREEN */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        .hero-title { font-size: 3rem; text-shadow: 0 0 20px #00f2ff; margin-bottom: 30px; }
        .game-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 2px solid #00f2ff; padding: 30px; border-radius: 20px;
            cursor: pointer; transition: 0.3s; width: 250px;
        }
        .game-card:hover { transform: scale(1.1); box-shadow: 0 0 30px #00f2ff; }

        /* GAME BOARD AREA */
        #game-view { display: none; padding: 20px; }
        #chess-board { 
            width: 400px; height: 400px; border: solid 5px #00f2ff; 
            margin: 20px auto; display: grid; grid-template-columns: repeat(8, 1fr);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
        }
        .square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .white { background: #ddd; }
        .black { background: #444; }
        .selected { background: yellow !important; color: black; }
        
        .chess-panel {
            background: rgba(255,255,255,0.1); padding: 10px;
            border-radius: 10px; width: 150px; margin: 10px auto;
        }
        .white-panel { border-left: 5px solid white; }
        .black-panel { border-left: 5px solid #00f2ff; }

        .btn {
            background: #ff4b2b; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 class="hero-title">BATTLE CROWN</h1>
        <div class="game-card" onclick="showGame()">
            <span style="font-size: 50px;">♟️</span>
            <h2>CHESS MASTER</h2>
            <p>Ready to Move?</p>
        </div>
    </div>

    <div id="game-view">
        <button class="btn" style="float: left;" onclick="location.reload()">⬅ EXIT</button>
        <h2 style="color: #00f2ff;">ARENA</h2>
        
        <div id="wrap" style="display: flex; flex-direction: column; align-items: center;">
            <div class="chess-panel black-panel">Black Panel</div>
            <div id="chess-board"></div>
            <div class="chess-panel white-panel">White Panel</div>
        </div>

        <button class="btn" onclick="celebrateWin()" style="background: #00f2ff; color: black;">CELEBRATE! 💣</button>
    </div>

    <script>
        const board = document.getElementById('chess-board');
        const piecesSymbols = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        let currentBoard = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        let selected = null;

        function showGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            createBoard();
        }

        function createBoard() {
            board.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let color = (r + c) % 2 === 0 ? 'white' : 'black';
                    const sq = document.createElement('div');
                    sq.className = `square ${color}`;
                    sq.innerHTML = piecesSymbols[currentBoard[r][c]] || '';
                    sq.onclick = () => handleMove(r, c);
                    board.appendChild(sq);
                }
            }
        }

        function handleMove(r, c) {
            if (selected) {
                currentBoard[r][c] = currentBoard[selected.r][selected.c];
                currentBoard[selected.r][selected.c] = '';
                selected = null;
                createBoard();
            } else {
                if (currentBoard[r][c] !== '') {
                    selected = {r, c};
                    createBoard();
                    const idx = r * 8 + c;
                    board.children[idx].classList.add('selected');
                }
            }
        }

        function celebrateWin() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
