<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Crown | Pro Gaming Portal 🎮</title>

<style>
    /* ANIMATED CHESS BACKGROUND */
    body {
        margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
        color: white; text-align: center; background-color: #050505;
        background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
        background-size: 50px 50px; animation: moveBg 15s linear infinite;
        overflow-x: hidden;
    }
    @keyframes moveBg { from { background-position: 0 0; } to { background-position: 50px 50px; } }

    h1 { margin-top: 40px; font-size: 2.5rem; text-shadow: 0 0 20px #00f2ff; letter-spacing: 3px; }

    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 40px; padding: 20px; }

    /* PRO GAME CARDS */
    .game-card {
        background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
        border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
        width: 200px; padding: 15px; transition: 0.4s; cursor: pointer;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .game-card:hover { transform: scale(1.08); border-color: #00f2ff; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); }

    .game-thumb { width: 100%; height: 120px; border-radius: 12px; background: #222; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }

    .play-btn {
        background: linear-gradient(45deg, #00f2ff, #0072ff); border: none;
        padding: 12px; border-radius: 30px; color: white; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 12px;
    }

    /* FULL SCREEN MODAL */
    #player {
        display: none; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%; background: #000; z-index: 9999;
    }
    .top-bar { height: 50px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #00f2ff; }
    .close-btn { background: #ff4b2b; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    iframe { width: 100%; height: calc(100% - 50px); border: none; }
</style>
</head>

<body>

<h1>BATTLE CROWN 🎮</h1>
<p style="color: #00f2ff;">Premium Games. No Downloads.</p>

<div class="container">
    <div class="game-card" onclick="play('https://games.poki.com/458742/chess-master')">
        <div class="game-thumb">♟️</div>
        <h3>Master Chess</h3>
        <button class="play-btn">Play Now</button>
    </div>

    <div class="game-card" onclick="play('https://games.poki.com/458742/moto-x3m')">
        <div class="game-thumb">🏍️</div>
        <h3>Moto X3M</h3>
        <button class="play-btn">Play Now</button>
    </div>

    <div class="game-card" onclick="play('https://games.poki.com/458742/tic-tac-toe')">
        <div class="game-thumb">❌</div>
        <h3>Pro TicTacToe</h3>
        <button class="play-btn">Play Now</button>
    </div>
</div>

<div id="player">
    <div class="top-bar">
        <span style="color:#00f2ff; font-weight:bold;">BATTLE CROWN PLAYER</span>
        <div class="close-btn" onclick="stop()">CLOSE [X]</div>
    </div>
    <iframe id="gameFrame" src="" allowfullscreen></iframe>
</div>

<script>
    function play(url) {
        document.getElementById('gameFrame').src = url;
        document.getElementById('player').style.display = 'block';
    }
    function stop() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('gameFrame').src = '';
    }
</script>

</body>
</html>
