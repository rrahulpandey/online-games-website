<!DOCTYPE html>
<html>
<head>
<title>Game Hub 🎮</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    overflow:hidden;
    background: radial-gradient(circle at top, #1a1a2e, #000);
}

/* Floating images */
.bg img {
    position:absolute;
    width:60px;
    opacity:0.15;
    animation: float linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh) rotate(0deg);
    }
    to {
        transform: translateY(-100vh) rotate(360deg);
    }
}

h1 {
    position:relative;
    z-index:2;
    padding:20px;
}

/* Game cards */
.games {
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
}

.card {
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin:20px;
    padding:20px;
    border-radius:15px;
    width:220px;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.card:hover {
    transform:scale(1.1);
    box-shadow:0 0 30px #00f2ff;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* Tic Tac Toe */
#ttt {
    display:grid;
    grid-template-columns:repeat(3,70px);
    margin:auto;
}

.cell {
    width:70px;
    height:70px;
    border:2px solid white;
    font-size:28px;
    line-height:70px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Game Hub</h1>

<div class="games">

<div class="card">
<h2>♟️ Chess</h2>
<a href="https://www.chess.com/play/computer" target="_blank">
<button>Play Now</button>
</a>
</div>

<div class="card">
<h2>❌⭕ Tic Tac Toe</h2>
<div id="ttt"></div>
<button onclick="reset()">Reset</button>
</div>

</div>

<!-- Background Chess Images -->
<div class="bg">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt60.png" style="left:10%; animation-duration:12s;">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt60.png" style="left:30%; animation-duration:9s;">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_klt60.png" style="left:50%; animation-duration:14s;">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_blt60.png" style="left:70%; animation-duration:8s;">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_nlt60.png" style="left:85%; animation-duration:11s;">
</div>

<script>
let board = document.getElementById("ttt");
let current = "X";
let cells = [];

for(let i=0;i<9;i++){
    let div = document.createElement("div");
    div.className="cell";
    div.onclick=function(){
        if(div.innerHTML==""){
            div.innerHTML=current;
            current = current=="X"?"O":"X";
        }
    }
    board.appendChild(div);
    cells.push(div);
}

function reset(){
    cells.forEach(c=>c.innerHTML="");
}
</script>

</body>
</html>
