<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Crown | Neon Snake Pro 🐍</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            background: #050505; color: #00f2ff; font-family: 'Poppins', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        h1 { margin: 5px 0; text-shadow: 0 0 15px #00f2ff; letter-spacing: 5px; font-size: 1.8rem; }

        /* GAME CONTAINER WITH GLOWING WALLS */
        #game-container { 
            position: relative; 
            border: 8px solid #00f2ff; /* Ye teri main wall hai */
            border-radius: 10px; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            background: #000;
        }

        canvas { display: block; background: #000; }

        .score-board { font-size: 20px; margin-bottom: 10px; background: rgba(0,242,255,0.1); padding: 5px 25px; border-radius: 20px; border: 1px solid #00f2ff; }

        /* MOBILE CONTROLS */
        .controls { display: grid; grid-template-columns: repeat(3, 65px); gap: 12px; margin-top: 20px; }
        .btn {
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00f2ff; color: #00f2ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; user-select: none;
        }
        .btn:active { background: #00f2ff; color: black; transform: scale(0.9); }
        .up { grid-column: 2; } .left { grid-column: 1; } .down { grid-column: 2; } .right { grid-column: 3; }

        #overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #overlay button {
            background: #ff4b2b; border: none; padding: 12px 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 30px; color: white; box-shadow: 0 0 15px #ff4b2b;
        }
    </style>
</head>
<body>

    <h1>BATTLE CROWN</h1>
    <div class="score-board">SCORE: <span id="scoreVal">0</span></div>

    <div id="game-container">
        <canvas id="snakeGame" width="300" height="300"></canvas>
        <div id="overlay">
            <h2 style="color: #ff4b2b; letter-spacing: 2px;">HIT THE WALL!</h2>
            <button onclick="resetGame()">REVIVE ⚡</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn up" onclick="changeDir('UP')">▲</div>
        <div class="btn left" onclick="changeDir('LEFT')">◀</div>
        <div class="btn down" onclick="changeDir('DOWN')">▼</div>
        <div class="btn right" onclick="changeDir('RIGHT')">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let gameSpeed = 200; // Slow and smooth speed

        let snake = [{ x: 140, y: 140 }, { x: 120, y: 140 }, { x: 100, y: 140 }];
        let food = { 
            x: Math.floor(Math.random() * 14) * box, 
            y: Math.floor(Math.random() * 14) * box 
        };
        let d = "RIGHT";

        // Sound System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playEatSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        document.addEventListener("keydown", (e) => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function changeDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            if(dir == "UP" && d != "DOWN") d = "UP";
            if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Snake Body (Rounded)
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#0077aa";
                ctx.beginPath();
                ctx.roundRect(snake[i].x, snake[i].y, box-1, box-1, 5);
                ctx.fill();
                if(i==0) { ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff"; }
                else { ctx.shadowBlur = 0; }
            }

            // Food (Neon Ball)
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;
