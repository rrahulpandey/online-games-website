<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Crown | Play Instantly 🎮</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>
    body {
        margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
        color: white; text-align: center; background-color: #0a0a0c;
        background-image: linear-gradient(45deg, #16161d 25%, transparent 25%), linear-gradient(-45deg, #16161d 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #16161d 75%), linear-gradient(-45deg, transparent 75%, #16161d 75%);
        background-size: 60px 60px; animation: moveBoard 20s linear infinite;
    }
    @keyframes moveBoard { from { background-position: 0 0; } to { background-position: 60px 60px; } }

    .games-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; }
    
    .card {
        background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
        width: 180px; padding: 20px; transition: 0.3s; cursor: pointer;
    }
    .card:hover { transform: translateY(-10px); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0,242,255,0.3); }

    .play-btn {
        background: linear-gradient(45deg, #00f2ff, #0072ff); border: none;
        padding: 10px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; width: 100%;
    }

    /* MODAL SYSTEM */
    #gameOverlay {
        display: none; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000;
    }
    .modal-nav {
        height: 60px; background: #111; display: flex; 
        justify-content: space-between; align-items: center; padding: 0 20px;
    }
    .close-btn { background: #ff4b2b; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

    /* GAME AREAS */
    #chessBoard { width: 350px; margin: 20px auto; max-width: 90vw; }
    .ttt-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin: 40px auto; justify-content: center; }
    .cell { width: 80px; height: 80px; background: #1e293b; border: 2px solid #00f2ff; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; }
</style>
</head>

<body>

<h1>BATTLE CROWN 🎮</h1>

<div class="games-container">
    <div class="card" onclick="openChess()">
        <div style="font-size: 40px;">♟️</div>
        <h2>Master Chess</h2>
        <button class="play-btn">PLAY NOW</button>
    </div>

    <div class="card" onclick="openTTT()">
        <div style="font-size: 40px;">❌⭕</div>
        <h2>Tic Tac Toe</h2>
        <button class="play-btn">PLAY NOW</button>
    </div>
</div>

<div id="gameOverlay">
    <div class="modal-nav">
        <span id="gameTitle" style="color: #00f2ff; font-weight: bold;">GAME PLAYER</span>
        <div class="close-btn" onclick="closeGame()">CLOSE [X]</div>
    </div>

    <div id="chessContainer" style="display:none;">
        <div id="chessBoard"></div>
        <p id="status">Turn: White</p>
        <button onclick="resetChess()" style="padding:10px; background:#00f2ff; border:none; border-radius:5px; cursor:pointer;">Reset Game</button>
    </div>

    <div id="tttContainer" style="display:none;">
        <div class="ttt-grid" id="tttGrid"></div>
        <h2 id="tttStatus">Your Turn: X</h2>
        <button onclick="resetTTT()" style="padding:10px; background:#00f2ff; border:none; border-radius:5px; cursor:pointer;">Restart</button>
    </div>
</div>

<script>
    const overlay = document.getElementById('gameOverlay');
    const chessCont = document.getElementById('chessContainer');
    const tttCont = document.getElementById('tttContainer');

    // --- CHESS LOGIC ---
    var board = null;
    var game = new Chess();
    function onDrop(source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        document.getElementById('status').innerText = "Turn: " + (game.turn() === 'w' ? 'White' : 'Black');
    }
    function openChess() {
        overlay.style.display = 'block'; chessCont.style.display = 'block'; tttCont.style.display = 'none';
        document.getElementById('gameTitle').innerText = "MASTER CHESS";
        setTimeout(() => {
            board = Chessboard('chessBoard', { draggable: true, position: 'start', onDrop: onDrop });
        }, 200);
    }
    function resetChess() { game.reset(); board.start(); document.getElementById('status').innerText = "Turn: White"; }

    // --- TIC TAC TOE LOGIC ---
    let tttPlayer = "X";
    let tttState = ["", "", "", "", "", "", "", "", ""];
    function openTTT() {
        overlay.style.display = 'block'; tttCont.style.display = 'block'; chessCont.style.display = 'none';
        document.getElementById('gameTitle').innerText = "TIC TAC TOE";
        renderTTT();
    }
    function renderTTT() {
        const grid = document.getElementById('tttGrid'); grid.innerHTML = "";
        tttState.forEach((val, i) => {
            const div = document.createElement('div'); div.className = 'cell'; div.innerText = val;
            div.onclick = () => { if(!val) { tttState[i] = tttPlayer; tttPlayer = tttPlayer === "X" ? "O" : "X"; renderTTT(); } };
            grid.appendChild(div);
        });
        document.getElementById('tttStatus').innerText = "Next Player: " + tttPlayer;
    }
    function resetTTT() { tttState = ["", "", "", "", "", "", "", "", ""]; tttPlayer = "X"; renderTTT(); }

    function closeGame() { overlay.style.display = 'none'; }
</script>

</body>
</html>
