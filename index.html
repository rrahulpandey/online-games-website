<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Crown | Play Instantly 🎮</title>

<style>
    /* MOVING CHESS BACKGROUND */
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white; text-align: center;
        min-height: 100vh;
        background-color: #0a0a0c;
        background-image: 
            linear-gradient(45deg, #16161d 25%, transparent 25%), 
            linear-gradient(-45deg, #16161d 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #16161d 75%), 
            linear-gradient(-45deg, transparent 75%, #16161d 75%);
        background-size: 60px 60px;
        animation: moveBoard 20s linear infinite;
    }

    @keyframes moveBoard {
        0% { background-position: 0 0; }
        100% { background-position: 60px 60px; }
    }

    h1 { padding-top: 30px; text-shadow: 0 0 15px #00f2ff; letter-spacing: 2px; }

    .games-container {
        display: flex; flex-wrap: wrap;
        justify-content: center; gap: 20px; margin-top: 50px;
        padding-bottom: 50px;
    }

    /* CARD DESIGN */
    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px; width: 180px; padding: 20px;
        transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0,242,255,0.3); }

    .icon-box { font-size: 40px; margin-bottom: 10px; }
    .card h2 { font-size: 16px; color: #00f2ff; margin-bottom: 15px; }

    .play-btn {
        background: linear-gradient(45deg, #00f2ff, #0072ff);
        border: none; padding: 10px; border-radius: 20px;
        color: white; font-weight: bold; cursor: pointer; width: 100%;
    }

    /* --- GAME OVERLAY --- */
    #gameOverlay {
        display: none;
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 2000;
        overflow-y: auto;
    }

    .nav-bar-modal {
        width: 100%; height: 60px; background: #111;
        display: flex; justify-content: space-between;
        align-items: center; padding: 0 20px; box-sizing: border-box;
    }

    .close-btn {
        color: white; font-size: 14px; cursor: pointer;
        background: #ff4b2b; padding: 8px 15px; border-radius: 5px; font-weight: bold;
    }

    /* Tic Tac Toe Board Inside Modal */
    .ttt-board {
        display: grid; grid-template-columns: repeat(3, 100px);
        gap: 10px; margin: 50px auto; justify-content: center;
    }

    .cell {
        width: 100px; height: 100px; background: #1e293b;
        border: 2px solid #3b82f6; font-size: 40px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; border-radius: 10px;
    }
</style>
</head>

<body>

<h1>BATTLE CROWN 🎮</h1>

<div class="games-container">
    <div class="card">
        <div class="icon-box">❌⭕</div>
        <h2>Tic Tac Toe</h2>
        <button class="play-btn" onclick="showTTT()">PLAY NOW</button>
    </div>

    <div class="card">
        <div class="icon-box">♟️</div>
        <h2>Classic Chess</h2>
        <button class="play-btn" onclick="openExternalGame('https://lichess.org/export/embed/light/vAt9ST7V?theme=auto&bg=auto')">PLAY NOW</button>
    </div>
</div>

<div id="gameOverlay">
    <div class="nav-bar-modal">
        <span id="gameTitle" style="color: #00f2ff; font-weight: bold;">GAME PLAYER</span>
        <div class="close-btn" onclick="closeGame()">CLOSE [X]</div>
    </div>
    
    <div id="tttContainer" style="display:none;">
        <div class="ttt-board" id="board"></div>
        <h2 id="status">Your Turn: X</h2>
        <button onclick="resetTTT()" style="padding:10px 20px; background:#3b82f6; border:none; color:white; border-radius:5px; cursor:pointer;">Restart Game</button>
    </div>

    <iframe id="externalFrame" src="" style="display:none; width:100%; height:calc(100% - 60px); border:none;"></iframe>
</div>

<script>
    const overlay = document.getElementById('gameOverlay');
    const tttContainer = document.getElementById('tttContainer');
    const externalFrame = document.getElementById('externalFrame');
    const gameTitle = document.getElementById('gameTitle');

    // --- TIC TAC TOE LOGIC ---
    let currentPlayer = "X";
    let gameState = ["", "", "", "", "", "", "", "", ""];
    const boardElement = document.getElementById('board');

    function createBoard() {
        boardElement.innerHTML = "";
        gameState.forEach((cell, index) => {
            const div = document.createElement('div');
            div.classList.add('cell');
            div.innerText = cell;
            div.onclick = () => handleMove(index);
            boardElement.appendChild(div);
        });
    }

    function handleMove(index) {
        if (gameState[index] === "") {
            gameState[index] = currentPlayer;
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById('status').innerText = `Your Turn: ${currentPlayer}`;
            createBoard();
        }
    }

    function resetTTT() {
        gameState = ["", "", "", "", "", "", "", "", ""];
        currentPlayer = "X";
        document.getElementById('status').innerText = "Your Turn: X";
        createBoard();
    }

    // --- OVERLAY CONTROLS ---
    function showTTT() {
        gameTitle.innerText = "TIC TAC TOE";
        overlay.style.display = "block";
        tttContainer.style.display = "block";
        externalFrame.style.display = "none";
        resetTTT();
    }

    function openExternalGame(url) {
        gameTitle.innerText = "CLASSIC CHESS";
        overlay.style.display = "block";
        tttContainer.style.display = "none";
        externalFrame.style.display = "block";
        externalFrame.src = url;
    }

    function closeGame() {
        overlay.style.display = "none";
        externalFrame.src = "";
    }
</script>

</body>
</html>
