<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Crown | Play Instantly 🎮</title>

<style>
    /* MOVING CHESS BACKGROUND */
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white; text-align: center;
        height: 100vh; overflow: hidden;
        background-color: #0a0a0c;
        background-image: 
            linear-gradient(45deg, #16161d 25%, transparent 25%), 
            linear-gradient(-45deg, #16161d 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #16161d 75%), 
            linear-gradient(-45deg, transparent 75%, #16161d 75%);
        background-size: 80px 80px;
        animation: moveBoard 15s linear infinite;
    }

    @keyframes moveBoard {
        0% { background-position: 0 0; }
        100% { background-position: 80px 80px; }
    }

    h1 { margin-top: 30px; text-shadow: 0 0 15px #00f2ff; }

    .games-container {
        display: flex; flex-wrap: wrap;
        justify-content: center; gap: 20px; margin-top: 50px;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px; width: 180px; padding: 15px;
        transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); border-color: #00f2ff; }

    .icon-box { font-size: 30px; margin-bottom: 10px; }

    button {
        background: linear-gradient(45deg, #00f2ff, #0072ff);
        border: none; padding: 10px; border-radius: 20px;
        color: white; font-weight: bold; cursor: pointer; width: 100%;
    }

    /* --- GAME MODAL (THE POPUP) --- */
    #gameOverlay {
        display: none; /* Pehle chhupa rahega */
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 1000;
    }

    .modal-content {
        position: relative; width: 90%; height: 80%;
        margin: 5% auto; background: #000;
        border: 2px solid #00f2ff; border-radius: 10px;
    }

    iframe { width: 100%; height: 100%; border: none; border-radius: 10px; }

    .close-btn {
        position: absolute; top: -40px; right: 0;
        color: white; font-size: 30px; cursor: pointer;
        background: #ff4b2b; padding: 5px 15px; border-radius: 5px;
    }
</style>
</head>

<body>

<h1>BATTLE CROWN 🎮</h1>

<div class="games-container">
    <div class="card">
        <div class="icon-box">♟️</div>
        <h2>Chess Pro</h2>
        <button onclick="openGame('https://www.chess.com/play/computer')">PLAY NOW</button>
    </div>

    <div class="card">
        <div class="icon-box">❌⭕</div>
        <h2>Tic Tac Toe</h2>
        <button onclick="alert('Tic Tac Toe is coming to fullscreen soon!')">PLAY NOW</button>
    </div>
</div>

<div id="gameOverlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeGame()">CLOSE X</span>
        <iframe id="gameFrame" src=""></iframe>
    </div>
</div>

<script>
    function openGame(url) {
        document.getElementById("gameFrame").src = url;
        document.getElementById("gameOverlay").style.display = "block";
    }

    function closeGame() {
        document.getElementById("gameOverlay").style.display = "none";
        document.getElementById("gameFrame").src = ""; // Game stop karne ke liye
    }
</script>

</body>
</html>
