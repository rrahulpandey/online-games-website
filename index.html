<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Crown | Pro Gaming 🎮</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background-color: #050505; color: white; overflow-x: hidden;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 50px 50px; animation: moveBg 20s linear infinite;
        }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* --- OPENING SELECTION SCREEN --- */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; transition: 0.5s;
        }
        .hero-title { font-size: 3rem; text-shadow: 0 0 20px #00f2ff; margin-bottom: 10px; }
        
        .game-grid { display: flex; gap: 30px; margin-top: 40px; }
        .game-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 20px;
            width: 220px; padding: 25px; cursor: pointer; transition: 0.3s;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .game-card:hover { transform: translateY(-15px); border-color: #00f2ff; box-shadow: 0 0 30px rgba(0,242,255,0.5); }
        .game-card h2 { color: #00f2ff; margin: 15px 0; }
        .game-card span { font-size: 50px; }

        /* --- GAME MODAL / VIEW --- */
        #game-view { display: none; padding: 20px; text-align: center; }
        .back-btn {
            position: absolute; top: 20px; left: 20px; background: #ff4b2b;
            color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;
        }

        /* --- CHESS BOARD --- */
        #board {
            display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px);
            border: 6px solid #00f2ff; margin: 30px auto; box-shadow: 0 0 40px rgba(0,242,255,0.4);
        }
        .sq { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; }
        .w-sq { background-color: #eee; }
        .b-sq { background-color: #555; }
        .selected { background-color: #00f2ff !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .player-status { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .status-pill { background: rgba(0,242,255,0.1); border: 1px solid #00f2ff; padding: 5px 20px; border-radius: 30px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 class="hero-title">BATTLE CROWN</h1>
        <p style="color: #aaa; letter-spacing: 2px;">SELECT YOUR ARENA</p>
        
        <div class="game-grid">
            <div class="game-card" onclick="startGame('chess')">
                <span>♟️</span>
                <h2>CHESS PRO</h2>
                <p style="font-size: 12px; color: #888;">Grandmaster Level</p>
            </div>
            <div class="game-card" onclick="startGame('ttt')">
                <span>❌</span>
                <h2>TIC-TAC-TOE</h2>
                <p style="font-size: 12px; color: #888;">Classic Battle</p>
            </div>
        </div>
    </div>

    <div id="game-view">
        <button class="back-btn" onclick="goHome()">⬅ BACK TO MENU</button>
        <h2 id="current-game-name" style="color: #00f2ff; margin-top: 50px;">CHESS MASTER</h2>
        
        <div class="player-status">
            <div class="status-pill" id="p1">White: Playing</div>
            <div class="status-pill" id="p2" style="opacity: 0.5;">Black: Waiting</div>
        </div>

        <div id="board"></div>

        <button onclick="celebrate()" style="margin-top: 20px; background: gold; color: black; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer;">CELEBRATE WIN! 💣</button>
    </div>

    <script>
        const pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        let boardState = [
            ['r','n','b','q','k','b','n','r'], ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''], ['','','','','','','',''],
            ['','','','','','','',''], ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'], ['R','N','B','Q','K','B','N','R']
        ];

        let selectedSq = null;

        function startGame(game) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            if(game === 'chess') setupChess();
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('game-view').style.display = 'none';
        }

        function setupChess() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `sq ${(r + c) % 2 === 0 ? 'w-sq' : 'b-sq'}`;
                    sq.innerHTML = pieces[boardState[r][c]] || '';
                    sq.onclick = () => handleMove(r, c);
                    boardDiv.appendChild(sq);
                }
            }
        }

        function handleMove(r, c) {
            if (selectedSq) {
                boardState[r][c] = boardState[selectedSq.r][selectedSq.c];
                boardState[selectedSq.r][selectedSq.c] = '';
                selectedSq = null;
                setupChess();
            } else if (boardState[r][c] !== '') {
                selectedSq = {r, c};
                setupChess();
                const idx = r * 8 + c;
                document.getElementsByClassName('sq')[idx].classList.add('selected');
            }
        }

        // --- CELEBRATION BOMB ---
        function celebrate() {
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        setupChess();
    </script>
</body>
</html>
