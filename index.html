<!DOCTYPE html>
<html>
<head>
<title>Game Hub 🎮</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    overflow:hidden;

    /* REAL chess board background */
    background-color:#111;
    background-image:
        linear-gradient(45deg, #444 25%, transparent 25%),
        linear-gradient(-45deg, #444 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #444 75%),
        linear-gradient(-45deg, transparent 75%, #444 75%);
    background-size:80px 80px;
    animation: moveBoard 5s linear infinite;
}

@keyframes moveBoard {
    from {background-position:0 0;}
    to {background-position:80px 80px;}
}

/* Game cards */
.games {
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.card {
    background:rgba(0,0,0,0.7);
    margin:20px;
    padding:20px;
    border-radius:15px;
    width:220px;
    box-shadow:0 0 15px rgba(0,255,255,0.5);
}

/* SMALL ICONS */
.card h2 {
    font-size:16px; /* clearly small */
}

/* Button */
button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* Tic Tac Toe */
#ttt {
    display:grid;
    grid-template-columns:repeat(3,60px);
    margin:auto;
}

.cell {
    width:60px;
    height:60px;
    border:2px solid white;
    font-size:18px; /* SMALL X O */
    line-height:60px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Game Hub</h1>

<div class="games">

<div class="card">
<h2>♟️ Chess</h2>
<a href="https://www.chess.com/play/computer" target="_blank">
<button>Play Now</button>
</a>
</div>

<div class="card">
<h2>❌⭕ Tic Tac Toe</h2>
<div id="ttt"></div>
<button onclick="reset()">Reset</button>
</div>

</div>

<script>
let board = document.getElementById("ttt");
let current = "X";
let cells = [];

for(let i=0;i<9;i++){
    let div = document.createElement("div");
    div.className="cell";
    div.onclick=function(){
        if(div.innerHTML==""){
            div.innerHTML=current;
            current = current=="X"?"O":"X";
        }
    }
    board.appendChild(div);
    cells.push(div);
}

function reset(){
    cells.forEach(c=>c.innerHTML="");
}
</script>

</body>
</html>
