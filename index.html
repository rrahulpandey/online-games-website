<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Crown | Play Instantly 🎮</title>

<style>
    /* MOVING CHESS BACKGROUND */
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white; text-align: center;
        height: 100vh; overflow: hidden;
        background-color: #0a0a0c;
        background-image: 
            linear-gradient(45deg, #16161d 25%, transparent 25%), 
            linear-gradient(-45deg, #16161d 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #16161d 75%), 
            linear-gradient(-45deg, transparent 75%, #16161d 75%);
        background-size: 80px 80px;
        animation: moveBoard 15s linear infinite;
    }

    @keyframes moveBoard {
        0% { background-position: 0 0; }
        100% { background-position: 80px 80px; }
    }

    h1 { margin-top: 30px; text-shadow: 0 0 15px #00f2ff; letter-spacing: 2px; }

    .games-container {
        display: flex; flex-wrap: wrap;
        justify-content: center; gap: 20px; margin-top: 50px;
    }

    /* SMALL SLEEK CARDS */
    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px; width: 160px; padding: 15px;
        transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0,242,255,0.3); }

    .icon-box { font-size: 30px; margin-bottom: 5px; }
    .card h2 { font-size: 14px; color: #00f2ff; margin: 10px 0; }

    button {
        background: linear-gradient(45deg, #00f2ff, #0072ff);
        border: none; padding: 8px; border-radius: 20px;
        color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 12px;
    }

    /* --- GAME MODAL (FULL SCREEN FEEL) --- */
    #gameOverlay {
        display: none;
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.98);
        z-index: 2000;
    }

    .modal-content {
        position: relative; width: 100%; height: 100%;
        background: #000;
    }

    iframe { width: 100%; height: calc(100% - 50px); border: none; margin-top: 50px; }

    .close-btn {
        position: absolute; top: 10px; right: 20px;
        color: white; font-size: 18px; cursor: pointer;
        background: #ff4b2b; padding: 5px 20px; border-radius: 5px;
        font-weight: bold; z-index: 3000;
    }
</style>
</head>

<body>

<h1>BATTLE CROWN 🎮</h1>

<div class="games-container">
    <div class="card">
        <div class="icon-box">♟️</div>
        <h2>Master Chess</h2>
        <button onclick="openGame('https://html5.gamedistribution.com/694809589d3148498c935bc9f18e9503/')">PLAY NOW</button>
    </div>

    <div class="card">
        <div class="icon-box">🏎️</div>
        <h2>Cyber Cars</h2>
        <button onclick="openGame('https://html5.gamedistribution.com/56578508e99849209706797960718507/')">PLAY NOW</button>
    </div>

    <div class="card">
        <div class="icon-box">❌⭕</div>
        <h2>Tic Tac Toe</h2>
        <button onclick="openGame('https://html5.gamedistribution.com/83c8340d7c3b490f84803964996962f3/')">PLAY NOW</button>
    </div>
</div>

<div id="gameOverlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeGame()">CLOSE [X]</span>
        <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    function openGame(url) {
        document.getElementById("gameFrame").src = url;
        document.getElementById("gameOverlay").style.display = "block";
    }

    function closeGame() {
        document.getElementById("gameOverlay").style.display = "none";
        document.getElementById("gameFrame").src = ""; 
    }
</script>

</body>
</html>
