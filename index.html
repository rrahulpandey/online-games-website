<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Crown | Neon Snake 🐍</title>
    <style>
        /* 1. DARK NEON THEME */
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            background: #0a0a0c; color: #00f2ff; font-family: 'Arial', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        h1 { margin: 10px 0; text-shadow: 0 0 10px #00f2ff; letter-spacing: 3px; }

        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; }

        canvas { display: block; background: #000; }

        .score-board { font-size: 24px; margin-bottom: 10px; font-weight: bold; }

        /* 2. MOBILE CONTROLS (Only visible on touch devices) */
        .controls {
            display: grid; grid-template-columns: repeat(3, 60px); 
            gap: 10px; margin-top: 20px;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(0, 242, 255, 0.2);
            border: 2px solid #00f2ff; color: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; user-select: none;
        }
        .btn:active { background: #00f2ff; color: black; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .down { grid-column: 2; }
        .right { grid-column: 3; }

        /* 3. GAME OVER OVERLAY */
        #overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #overlay button {
            background: #00f2ff; border: none; padding: 10px 20px;
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>BATTLE CROWN</h1>
    <div class="score-board">Score: <span id="scoreVal">0</span></div>

    <div id="game-container">
        <canvas id="snakeGame" width="300" height="300"></canvas>
        <div id="overlay">
            <h2 style="color: #ff4b2b;">GAME OVER!</h2>
            <button onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn up" onclick="changeDir('UP')">▲</div>
        <div class="btn left" onclick="changeDir('LEFT')">◀</div>
        <div class="btn down" onclick="changeDir('DOWN')">▼</div>
        <div class="btn right" onclick="changeDir('RIGHT')">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let gameSpeed = 150;

        let snake = [{ x: 140, y: 140 }];
        let food = { 
            x: Math.floor(Math.random() * 14 + 1) * box, 
            y: Math.floor(Math.random() * 14 + 1) * box 
        };
        let d = "RIGHT";

        // Keyboard Controls
        document.addEventListener("keydown", (e) => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        // Mobile Control Function
        function changeDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            if(dir == "UP" && d != "DOWN") d = "UP";
            if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#0088aa";
                ctx.strokeStyle = "black";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Draw Food
            ctx.fillStyle = "#ff4b2b";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff4b2b";
            ctx.fillRect(food.x, food.y, box, box);
            ctx.shadowBlur = 0;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Eat Food Logic
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("scoreVal").innerText = score;
                food = {
                    x: Math.floor(Math.random() * 14 + 1) * box,
                    y: Math.floor(Math.random() * 14 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over Rules
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                document.getElementById("overlay").style.display = "flex";
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 140, y: 140 }];
            d = "RIGHT";
            score = 0;
            document.getElementById("scoreVal").innerText = score;
            document.getElementById("overlay").style.display = "none";
            clearInterval(game);
            game = setInterval(draw, gameSpeed);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
