<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Crown | Pro Chess ♟️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0; background: #0a0a0c; color: white;
            font-family: 'Segoe UI', sans-serif;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 50px 50px; animation: moveBg 20s linear infinite;
        }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* SELECTION SCREEN */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        .hero-title { font-size: 3.5rem; text-shadow: 0 0 20px #00f2ff; font-weight: bold; }
        .game-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 2px solid #00f2ff; padding: 40px; border-radius: 25px;
            cursor: pointer; transition: 0.3s; width: 280px; margin-top: 30px;
        }
        .game-card:hover { transform: translateY(-10px); box-shadow: 0 0 40px rgba(0, 242, 255, 0.5); }

        /* GAME BOARD AREA */
        #game-view { display: none; padding: 20px; text-align: center; }
        #myBoard { width: 400px; margin: 20px auto; max-width: 90vw; border: 5px solid #00f2ff; border-radius: 8px; }
        
        .status-bar {
            background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff;
            padding: 10px 25px; border-radius: 50px; display: inline-block;
            margin: 15px 0; font-weight: bold; color: #00f2ff;
        }

        .btn {
            background: #ff4b2b; color: white; border: none; padding: 12px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold; margin: 10px;
        }
        .btn-home { position: absolute; top: 20px; left: 20px; }

        /* Chess Pieces Styling */
        .piece-417db { width: 100%; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 class="hero-title">BATTLE CROWN</h1>
        <p style="color: #00f2ff; letter-spacing: 5px;">GRANDMASTER EDITION</p>
        <div class="game-card" onclick="showGame()">
            <span style="font-size: 60px;">♟️</span>
            <h2 style="margin: 15px 0;">PLAY CHESS</h2>
            <p style="color: #888;">Rule-Based Professional Match</p>
        </div>
    </div>

    <div id="game-view">
        <button class="btn btn-home" onclick="location.reload()">⬅ EXIT</button>
        <h2 style="text-shadow: 0 0 10px #00f2ff;">ARENA</h2>
        
        <div class="status-bar" id="status">White's Turn</div>
        <div id="myBoard"></div>
        
        <div>
            <button class="btn" style="background: #00f2ff; color: black;" onclick="resetGame()">RESTART MATCH</button>
        </div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            // Game over ho gaya ya wrong turn hai toh piece mat hilne do
            if (game.game_over()) return false;

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            // Move check karo (Rules ke mutabik)
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Hamesha queen mein promote hoga simplified rakhne ke liye
            });

            // Agar move illegal hai (Rule ke khilaaf) toh piece wapas bhej do
            if (move === null) return 'snapback';

            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = 'White';
            if (game.turn() === 'b') moveColor = 'Black';

            if (game.in_checkmate()) {
                status = 'CHECKMATE! ' + moveColor + ' Lost.';
                celebrate();
            } else if (game.in_draw()) {
                status = 'GAME DRAW!';
            } else {
                status = moveColor + "'s Turn";
                if (game.in_check()) {
                    status += ' (CHECK!)';
                }
            }

            $status.html(status);
        }

        function showGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            
            var config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('myBoard', config);
            updateStatus();
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        function celebrate() {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
