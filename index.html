<!DOCTYPE html>
<html>
<head>
<title>Game Hub 🎮</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* Floating icons */
.icon {
    position:absolute;
    font-size:30px;
    opacity:0.2;
    animation: float 10s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
    }
    to {
        transform: translateY(-100vh);
    }
}

h1 {
    position:relative;
    z-index:1;
    padding:20px;
}

.games {
    position:relative;
    z-index:1;
    display:flex;
    justify-content:center;
}

.card {
    background:rgba(255,255,255,0.1);
    margin:20px;
    padding:20px;
    border-radius:15px;
    width:220px;
}

/* Tic Tac Toe */
#ttt {
    display:grid;
    grid-template-columns:repeat(3,80px);
    margin:auto;
}

.cell {
    width:80px;
    height:80px;
    border:2px solid white;
    font-size:30px;
    line-height:80px;
    cursor:pointer;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
}
</style>
</head>

<body>

<h1>🎮 Game Hub</h1>

<div class="games">

<div class="card">
<h2>♟️ Chess</h2>
<a href="https://www.chess.com/play/computer" target="_blank">
<button>Play Now</button>
</a>
</div>

<div class="card">
<h2>❌⭕ Tic Tac Toe</h2>
<div id="ttt"></div>
<button onclick="reset()">Reset</button>
</div>

</div>

<!-- Floating Icons -->
<div class="icon" style="left:10%; animation-duration:12s;">♟️</div>
<div class="icon" style="left:30%; animation-duration:8s;">❌</div>
<div class="icon" style="left:50%; animation-duration:10s;">⭕</div>
<div class="icon" style="left:70%; animation-duration:7s;">🎮</div>
<div class="icon" style="left:85%; animation-duration:9s;">♜</div>

<script>
let board = document.getElementById("ttt");
let current = "X";
let cells = [];

for(let i=0;i<9;i++){
    let div = document.createElement("div");
    div.className="cell";
    div.onclick=function(){
        if(div.innerHTML==""){
            div.innerHTML=current;
            current = current=="X"?"O":"X";
        }
    }
    board.appendChild(div);
    cells.push(div);
}

function reset(){
    cells.forEach(c=>c.innerHTML="");
}
</script>

</body>
</html>
